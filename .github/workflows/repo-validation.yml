name: Repo Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release_audit:
    name: Repo Validation
    runs-on: ubuntu-latest
    env:
      AOA_TECHNIQUES_ROOT: ${{ github.workspace }}/.deps/aoa-techniques
      AOA_PLAYBOOKS_ROOT: ${{ github.workspace }}/.deps/aoa-playbooks
      AOA_EVALS_ROOT: ${{ github.workspace }}/.deps/aoa-evals
      TREE_OF_SOPHIA_ROOT: ${{ github.workspace }}/.deps/Tree-of-Sophia
      AOA_MEMO_ROOT: ${{ github.workspace }}/.deps/aoa-memo
      AOA_AGENTS_ROOT: ${{ github.workspace }}/.deps/aoa-agents
      AGENTS_OF_ABYSS_ROOT: ${{ github.workspace }}/.deps/Agents-of-Abyss
      EIGHT_DIONYSUS_ROOT: ${{ github.workspace }}/.deps/8Dionysus
      DIONYSUS_ROOT: ${{ github.workspace }}/.deps/Dionysus
      ATM10_AGENT_ROOT: ${{ github.workspace }}/.deps/ATM10-Agent
      AOA_ROUTING_ROOT: ${{ github.workspace }}/.deps/aoa-routing
      AOA_SDK_ROOT: ${{ github.workspace }}/.deps/aoa-sdk
      AOA_SKILLS_ROOT: ${{ github.workspace }}/.deps/aoa-skills
      AOA_STATS_ROOT: ${{ github.workspace }}/.deps/aoa-stats
      ABYSS_STACK_ROOT: ${{ github.workspace }}/.deps/abyss-stack
      ABYSS_MACHINE_REPO_ROOT: ${{ github.workspace }}/.deps/abyss-machine
      AOA_SESSION_MEMORY_ROOT: ${{ github.workspace }}/.deps/aoa-session-memory
      AOA_4PDA_CONNECTOR_ROOT: ${{ github.workspace }}/.deps/aoa-4pda-connector
      AOA_COURSE_CONNECTOR_ROOT: ${{ github.workspace }}/.deps/aoa-course-connector
      AOA_DISCORD_CONNECTOR_ROOT: ${{ github.workspace }}/.deps/aoa-discord-connector
      AOA_STACKOVERFLOW_CONNECTOR_ROOT: ${{ github.workspace }}/.deps/aoa-stackoverflow-connector
      AOA_TELEGRAM_CONNECTOR_ROOT: ${{ github.workspace }}/.deps/aoa-telegram-connector
      AOA_XDA_CONNECTOR_ROOT: ${{ github.workspace }}/.deps/aoa-xda-connector
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check repo-local KAG index family
        uses: ./.github/actions/repo-local-kag-index

      - name: Checkout Tree-of-Sophia
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Tree-of-Sophia
          ref: 0b8312b16fc1a43480f0358656e42f40c2459a2d
          path: .deps/Tree-of-Sophia
          fetch-depth: 0

      - name: Checkout Agents-of-Abyss
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Agents-of-Abyss
          ref: 49f9943e8aa11314ddab71e93331f5e6dee171df
          path: .deps/Agents-of-Abyss
          fetch-depth: 0

      - name: Checkout 8Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/8Dionysus
          ref: 82193b091d2bc2592c9ece1249c67dbc965fa342
          path: .deps/8Dionysus
          fetch-depth: 0

      - name: Checkout Dionysus
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/Dionysus
          ref: b22292be4545356059184c4527e79499bfd7d0eb
          path: .deps/Dionysus
          fetch-depth: 0

      - name: Checkout ATM10-Agent
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/ATM10-Agent
          ref: 5044451c1c0690acaa2d73dd0e7f6a41f7c157d5
          path: .deps/ATM10-Agent
          fetch-depth: 0

      - name: Checkout aoa-memo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-memo
          ref: cfd98d6f6f8e7a00a11777beffd0750b9dfe5f62
          path: .deps/aoa-memo
          fetch-depth: 0

      - name: Checkout aoa-playbooks
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-playbooks
          ref: 1bfad256e2c7996d4cf81f63e641b01574919d6b
          path: .deps/aoa-playbooks
          fetch-depth: 0

      - name: Checkout aoa-evals
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-evals
          ref: 804edd282696436594a16bd0be2b874a6d5123be
          path: .deps/aoa-evals
          fetch-depth: 0

      - name: Checkout aoa-agents
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-agents
          ref: 7837d8951b68a47d576fa0495ab36650f770e0da
          path: .deps/aoa-agents
          fetch-depth: 0

      - name: Checkout aoa-techniques
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-techniques
          ref: 5fa63ab7464b502a5cf3412e4680d1ef9f13ecce
          path: .deps/aoa-techniques
          fetch-depth: 0

      - name: Checkout aoa-session-memory
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-session-memory
          ref: 818c2a7d59bbe9fb9600fcb959b42d552ae9d705
          path: .deps/aoa-session-memory
          fetch-depth: 0
          ssh-key: ${{ secrets.AOA_SESSION_MEMORY_DEPLOY_KEY }}
          persist-credentials: false

      - name: Checkout aoa-routing
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-routing
          ref: f182803ecb79f121f049d6c372ace3d52f69abb1
          path: .deps/aoa-routing
          fetch-depth: 0

      - name: Checkout aoa-sdk
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-sdk
          ref: d8d7b21d7d81329c53995715f2fb35f5dd68a7bc
          path: .deps/aoa-sdk
          fetch-depth: 0

      - name: Checkout aoa-skills
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-skills
          ref: d799ee90248bf9827848dfbe08dc89ecd92efd5a
          path: .deps/aoa-skills
          fetch-depth: 0

      - name: Checkout aoa-stats
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-stats
          ref: 86320eaed89a4a0a1e99a701a65b9beb2704d1e6
          path: .deps/aoa-stats
          fetch-depth: 0

      - name: Checkout abyss-stack
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-stack
          ref: 4d2e66ca6ac156fea1b8cf59ffbd9723dd3298cd
          path: .deps/abyss-stack
          fetch-depth: 0

      - name: Checkout abyss-machine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/abyss-machine
          ref: a694ae1b9b267dfa91645b934427d5c994a07a9a
          path: .deps/abyss-machine
          fetch-depth: 0

      - name: Checkout aoa-4pda-connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-4pda-connector
          ref: a06acc2bc288a3be6b3bc4d654eb350f7aa7171a
          path: .deps/aoa-4pda-connector
          fetch-depth: 0

      - name: Checkout aoa-course-connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-course-connector
          ref: 948315ca430d575e40ed49be788e7bfbab6a7602
          path: .deps/aoa-course-connector
          fetch-depth: 0

      - name: Checkout aoa-discord-connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-discord-connector
          ref: fcac6256dbded4a8694b22f1c9cb9fb478a58347
          path: .deps/aoa-discord-connector
          fetch-depth: 0

      - name: Checkout aoa-stackoverflow-connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-stackoverflow-connector
          ref: 43221ca5700687feefa2fce5dc809c9b80fe9372
          path: .deps/aoa-stackoverflow-connector
          fetch-depth: 0

      - name: Checkout aoa-telegram-connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-telegram-connector
          ref: 1ebf5f9074ca014db83ac219ef28c17cbc05c343
          path: .deps/aoa-telegram-connector
          fetch-depth: 0

      - name: Checkout aoa-xda-connector
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: 8Dionysus/aoa-xda-connector
          ref: 0bce839df06edba50553fb34ca758716792b05f6
          path: .deps/aoa-xda-connector
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install PyYAML jsonschema

      - name: Run release audit
        run: python scripts/release_check.py

      - name: Check generated outputs are committed
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all -- generated)" ]; then
            git status --porcelain --untracked-files=all -- generated
            exit 1
          fi
