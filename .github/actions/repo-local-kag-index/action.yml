name: Repo-local KAG index family
description: Check repository-owned source, artifact, anchor, entity, event, assertion, and relation indexes against the aoa-kag builder.

inputs:
  repo-root:
    description: Repository root relative to the caller workspace.
    default: .
  output:
    description: Source surface index path relative to the repository root; sibling repository indexes share its directory.
    default: kag/indexes/source_surface_index.json
  history-ref:
    description: Durable Git history boundary used before the current source snapshot; pull requests default to the base SHA.
    default: ""
  event-history-ref:
    description: Durable Git history boundary used before the current source snapshot; pull requests default to the base SHA.
    default: ""

runs:
  using: composite
  steps:
    - name: Prepare stable repository history
      id: history
      shell: bash
      working-directory: ${{ inputs.repo-root }}
      env:
        INPUT_HISTORY_REF: ${{ inputs.history-ref }}
        INPUT_EVENT_HISTORY_REF: ${{ inputs.event-history-ref }}
        PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        CURRENT_REF_NAME: ${{ github.ref_name }}
        DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      run: |
        set -euo pipefail
        if [[ "$(git rev-parse --is-shallow-repository)" == "true" ]]; then
          git fetch --no-tags --prune --unshallow origin
        fi
        if [[ -n "$INPUT_HISTORY_REF" ]]; then
          history_ref="$INPUT_HISTORY_REF"
        elif [[ -n "$PULL_REQUEST_BASE_SHA" ]]; then
          history_ref="$PULL_REQUEST_BASE_SHA"
        elif [[ -n "$DEFAULT_BRANCH" && "$CURRENT_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
          default_ref="refs/remotes/origin/$DEFAULT_BRANCH"
          git fetch --no-tags --prune origin \
            "+refs/heads/$DEFAULT_BRANCH:$default_ref"
          history_ref="$(git merge-base HEAD "$default_ref")"
        else
          history_ref="HEAD"
        fi
        event_history_ref="${INPUT_EVENT_HISTORY_REF:-$history_ref}"
        if ! git cat-file -e "${history_ref}^{commit}" 2>/dev/null; then
          git fetch --no-tags --prune origin "$history_ref"
        fi
        git cat-file -e "${history_ref}^{commit}"
        if ! git cat-file -e "${event_history_ref}^{commit}" 2>/dev/null; then
          git fetch --no-tags --prune origin "$event_history_ref"
        fi
        git cat-file -e "${event_history_ref}^{commit}"
        repo_name="$(basename "$(git rev-parse --show-toplevel)")"
        printf 'AOA_REPO_LOCAL_KAG_HISTORY_REPO=%s\n' "$repo_name" >> "$GITHUB_ENV"
        printf 'AOA_REPO_LOCAL_KAG_HISTORY_REF=%s\n' "$history_ref" >> "$GITHUB_ENV"
        printf 'AOA_REPO_LOCAL_KAG_EVENT_HISTORY_REF=%s\n' "$event_history_ref" >> "$GITHUB_ENV"
        printf 'ref=%s\n' "$history_ref" >> "$GITHUB_OUTPUT"
        printf 'event-ref=%s\n' "$event_history_ref" >> "$GITHUB_OUTPUT"
    - name: Check repo-local index family parity
      shell: bash
      working-directory: ${{ github.workspace }}
      run: >-
        python3 "$GITHUB_ACTION_PATH/../../../scripts/generate_repo_local_kag_index.py"
        --repo-root "${{ inputs.repo-root }}"
        --output "${{ inputs.output }}"
        --index-family
        --history-ref "${{ steps.history.outputs.ref }}"
        --event-history-ref "${{ steps.history.outputs.event-ref }}"
        --check
    - name: Check incremental index family parity
      shell: bash
      working-directory: ${{ github.workspace }}
      run: >-
        python3 "$GITHUB_ACTION_PATH/../../../scripts/generate_repo_local_kag_index.py"
        --repo-root "${{ inputs.repo-root }}"
        --output "${{ inputs.output }}"
        --index-family
        --incremental
        --history-ref "${{ steps.history.outputs.ref }}"
        --event-history-ref "${{ steps.history.outputs.event-ref }}"
        --check
    - name: Ensure repo-local validation dependencies
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        set -euo pipefail
        python3 -c "import jsonschema" || python3 -m pip install --disable-pip-version-check jsonschema
    - name: Validate repo-local index family contract
      shell: bash
      working-directory: ${{ github.workspace }}
      run: >-
        python3 "$GITHUB_ACTION_PATH/../../../scripts/validate_repo_local_kag_family.py"
        --repo-root "${{ inputs.repo-root }}"
        --source-index "${{ inputs.output }}"
